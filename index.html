, "10 lần.", "20 lần.", "25 lần."], "answer": 3}, {"question": "Với MBA ba cuộn dây sao-sao-tam giác, mục đích của việc đấu nối đất sẵn một điểm ở cuộn dây đấu tam giác (khi không sử dụng cuộn này vào mục đích cấp tải) là:", "options": ["Để cố định điện thế (bằng điện thế đất) của một điểm trong tam giác, nhờ đó điện áp với đất và với vỏ của các pha là xác định khi bình thường cũng như khi quá áp.", "Để tránh ảnh hư­ởng đến cách điện dây quấn này khi có chạm đất không ổn định (chập chờn).", "Để tạo điều kiện cho bảo vệ 87T làm việc khi có thêm một điểm chạm  đất nữa tại cuộn dây này.", "Để triệt tiêu dòng hoặc áp thứ tự không."], "answer": 0}, {"question": "Trong vận hành, nếu máy biến áp có những hiện tượng khác thường như chảy dầu, thiếu dầu, bị nóng quá mức, có tiếng kêu khác thường, phát nóng cục bộ ở đầu cốt sứ, bộ điều áp dưới tải hoạt động không bình thường....:", "options": ["Nhanh chóng cô lập MBA ra khỏi vận hành.", "Báo cáo nhân viên vận hành cấp trên trực tiếp để xử lý.", "Phải tìm mọi biện pháp để giải quyết, đồng thời báo cáo với điều độ cấp trên, lãnh đạo trực tiếp và ghi vào sổ nhật ký vận hành.", "Tất cả các ý đều đúng."], "answer": 2}, {"question": "Tham số điện áp ngắn mạch UN% đặc trưng cho:", "options": ["Điện kháng của MBA.", "Điện trở của MBA.", "Điện dung của MBA.", "Tổng trở toàn phần của MBA."], "answer": 3}, {"question": "Khi vận hành song song các máy biến áp, điện áp ngắn mạch UN% có ảnh hưởng như thế nào?", "options": ["Ảnh hưởng đến sự phân bố phụ tải theo tỉ lệ công suất của các MBA.", "Ảnh hưởng đến sự phân bố điện áp của các MBA.", "Ảnh hưởng đến chế độ vận hành của các MBA.", "Không ảnh hưởng đến điều kiện làm việc của các MBA."], "answer": 0}, {"question": "Khi 02 MBA làm việc song song, nếu điều kiện điện áp ngắn mạch không đảm bảo thì:", "options": ["Làm xuất hiện dòng điện cân bằng chạy qua 2 máy biến áp.", "Làm xuất hiện điện áp cân bằng chạy qua 2 máy biến áp.", "Khi có quá tải, máy có điện áp ngắn mạch lớn sẽ bị quá tải trước.", "Khi có quá tải, máy có điện áp ngắn mạch nhỏ sẽ bị quá tải trước."], "answer": 3}, {"question": "Cấu tạo đầu nạp và đầu lắp đồng hồ áp lực khí SF6 của máy cắt khí SF6:", "options": ["Van điện từ.", "Van bướm.", "Van một chiều.", "Van cảm ứng."], "answer": 2}, {"question": "Định nghĩa về dao cách ly nào đúng nhất trong các câu sau:", "options": ["Dao cách ly là một thiết bị dùng để đóng cắt mạch điện khi quá tải trên thiết bị, được dùng để cách ly các phần thiết bị cần được sửa chữa với phần còn lại của lưới điện.", "Dao cách ly là một thiết bị dùng để đóng cắt mạch điện, được dùng để cách ly các phần thiết bị cần được sửa chữa với phần còn lại của lưới điện.", "Dao cách ly là một thiết bị dùng để đóng cắt mạch điện khi có quá điện áp, được dùng để cách ly các phần thiết bị cần được sửa chữa với phần còn lại của lưới điện.", "Dao cách ly là một thiết bị dùng để đóng cắt mạch điện chủ yếu khi không có dòng tải, được dùng để cách ly các phần thiết bị cần được sửa chữa với phần còn lại của lưới điện."], "answer": 3}, {"question": "Giải pháp kỹ thuật thay một bình ắcquy hỏng bằng bình ắcquy dự phòng:", "options": ["Vẫn để ắcquy vận hành, nối song song bình ắcquy dự phòng với bình ắcquy  hỏng, sau đó tháo bỏ bình ắc quy hỏng ra ngoài.", "Vẫn để ắcquy vận hành, nối tắt bình ắcquy hỏng, tháo bình hỏng ra khỏi vận hành, lắp bình dự phòng vào vị trí.", "Vẫn để ắcquy vận hành, nối song song bình ắcquy hỏng với điện trở, tháo bình hỏng ra khỏi vận hành, lắp bình dự phòng vào vị trí đã tháo.", "Tách ắcquy ra khỏi vận hành, tháo bình hỏng ra khỏi vận hành, lắp bình dự phòng vào vị trí đã tháo."], "answer": 0}, {"question": "Khi một bình ắc quy bị hư hỏng, không có bình ắc quy dự phòng để thay thế phải làm như thế nào?", "options": ["Tách ắcquy khỏi vận hành bằng cách cắt cầu dao ắcquy lên hệ thống thanh cái, nối tắt bình ắcquy hỏng, sau đó tách bình hỏng ra khỏi vận hành.", "Vẫn để ắcquy vận hành, nối tắt bình ắcquy hỏng bằng đoạn dây có tiết diện tương đương, sau đó tách bình hỏng ra khỏi vận hành.", "Vẫn để hệ thống ắcquy vận hành, nối song song với bình ắcquy hỏng một điện trở có trị số 0.25 - 1W  (Với công suất chọn sao cho chịu được dòng phụ tải của ắcquy). Sau khi đã tháo đưa bình ắcquy hỏng ra ngoài, dùng một đoạn dây đồng có tiết diện chịu được dòng phụ tải để nối tắt 2 đầu vị trí ắcquy hỏng và tháo điện trở ra.", "Vẫn để hệ thống ắc quy vận hành bình thường, khi nào có bình ắc quy mới thì tiến hành thay thế."], "answer": 2}, {"question": "Một thiết bị điện cho phép điều độ cấp trên thực hiện quyền kiểm tra trong trường hợp nào ?", "options": ["Trong trường hợp việc thực hiện quyền điều khiển của cấp điều độ cấp dưới hoặc Đơn vị quản lý vận hành làm thay đổi, ảnh hưởng đến chế độ vận hành của hệ thống điện hoặc thiết bị điện thuộc quyền điều khiển của điều độ cấp trên.", "Trong trường hợp việc thực hiện quyền điều khiển của cấp điều độ cấp dưới làm thay đổi, ảnh hưởng đến chế độ vận hành của hệ thống điện hoặc thiết bị điện thuộc quyền điều khiển của điều độ cấp trên.", "Trong trường hợp việc thực hiện quyền điều khiển của Đơn vị quản lý vận hành làm thay đổi, ảnh hưởng đến chế độ vận hành của hệ thống điện hoặc thiết bị điện thuộc quyền điều khiển của điều độ cấp trên.", "Trong mọi trường hợp điều độ cấp trên đều được phép thực hiện quyền kiểm tra thiết bị."], "answer": 0}, {"question": "Quy trình thao tác hệ thống điện quốc gia, cho phép kiểm tra trạng thái máy cắt theo chỉ thị của đèn tín hiệu và của đồng hồ đo lường mà không cần kiểm tra chỉ thị trạng thái tại chỗ trong các trường hợp nào:", "options": ["Sau khi thao tác máy cắt, không thao tác dao cách ly hai phía của máy cắt này.", "Sau khi thao tác máy cắt, việc thao tác dao cách ly hai phía máy cắt được thực hiện bằng điều khiển từ xa (tại phòng điều khiển trung tâm).", "Thực hiện thao tác xa.", "Tất cả các ý  đều đúng."], "answer": 3}, {"question": "Quy trình thao tác hệ thống điện quốc gia, trước khi thao tác di chuyển từ trạng thái vận hành sang trang thái thí nghiệm hoặc ngược lại của máy cắt hợp bộ cần phải kiểm tra:", "options": ["Trạng thái đóng của máy hợp bộ.", "Trạng thái mở của máy hợp bộ.", "Không cần thiết kiểm tra.", "Tất cả các ý đều sai."], "answer": 1}, {"question": "Quy trình thao tác hệ thống điện quốc gia, thao tác tại chỗ dao cách ly phải:", "options": ["Thực hiện nhanh chóng và dứt khoát, nhưng không được gây hư hỏng dao cách ly. Nghiêm cấm cắt (hoặc đóng) lưỡi dao trở lại khi thấy xuất hiện hồ quang trong quá trình đóng (hoặc cắt) dao cách ly.", "Thực hiện nhanh chóng và dứt khoát, nhưng không được đập mạnh ở cuối hành trình. Trong quá trình đóng (hoặc cắt) dao cách ly nghiêm cấm cắt (hoặc đóng) lưỡi dao trở lại khi thấy xuất hiện hồ quang.", "Thực hiện nhanh chóng và dứt khoát, nhưng không được gây hư hỏng dao cách ly. Trong quá trình đóng (hoặc cắt) dao cách ly nghiêm cấm tiếp tục đóng (hoặc cắt) lưỡi dao cách ly khi thấy xuất hiện hồ quang.", "Thực hiện nhanh chóng và dứt khoát. Nghiêm cấm cắt (hoặc đóng) lưỡi dao trở lại khi thấy xuất hiện hồ quang trong quá trình đóng (hoặc cắt) dao cách ly."], "answer": 0}, {"question": "Quy trình thao tác hệ thống điện quốc gia, qui định ngay sau khi kết thúc thao tác dao cách ly cần kiểm tra:", "options": ["Vị trí các lưỡi dao phòng tránh trường hợp chưa đóng cắt hết hành trình, lưỡi dao trượt ra ngoài hàm tĩnh.", "Vị trí các lưỡi dao đã đóng cắt hết hành trình hoặc tiếp xúc.", "Vị trí các lưỡi dao đã đóng cắt hết hành trình hoặc tiếp xúc tốt trừ trường hợp thao tác xa đối với trạm điện, nhà máy điện không người trực vận hành.", "Vị trí các áp tô mát cấp nguồn động cơ dao cách ly bị nhảy khi thao tác."], "answer": 2}, {"question": "Quy trình thao tác hệ thống điện quốc gia, người nhận lệnh thao tác phải:", "options": ["Nhắc lại lệnh, ghi chép đầy đủ lệnh thao tác, tên người ra lệnh và thời điểm yêu cầu thao tác. Chỉ khi người ra lệnh xác định hoàn toàn đúng và cho phép thao tác thì người nhận lệnh mới được tiến hành thao tác. Thao tác xong phải ghi lại thời điểm kết thúc và báo cáo lại cho người ra lệnh.", "Nhắc lại toàn bộ lệnh, ghi chép đầy đủ trình tự thao tác, tên người ra lệnh và thời điểm yêu cầu thao tác và tiến hành thao tác. Thao tác xong phải ghi lại thời điểm kết thúc và báo cáo lại cho người ra lệnh.", "Ghi chép đầy đủ trình tự thao tác, tên người ra lệnh và thời điểm yêu cầu thao tác và tiến hành thao tác. Thao tác xong phải ghi lại thời điểm kết thúc và báo cáo lại cho người ra lệnh.", "Ghi chép đầy đủ trình tự thao tác, tên người ra lệnh và thời điểm yêu cầu thao tác. Chỉ khi người ra lệnh xác định hoàn toàn đúng và cho phép thao tác thì người nhận lệnh mới được tiến hành thao tác. Thao tác xong phải báo cáo lại cho người ra lệnh."], "answer": 0}, {"question": "Theo quy trình thao tác HTĐ Quốc gia, thao tác là:", "options": ["Là hoạt động thay đổi tình trạng của một hoặc nhiều thiết bị trong hệ thống điện", "Là hoạt động thay đổi chế độ vận hành của một hoặc nhiều thiết bị trong hệ thống điện", "Là hoạt động thay đổi trạng thái của một hoặc nhiều thiết bị trong hệ thống điện nhằm mục đích thay đổi chế độ vận hành của thiết bị đó.", "Là yêu cầu thực hiện một hoạt động nhằm mục đích điều độ."], "answer": 2}, {"question": "Theo Quy trình thao tác hệ thống điện quốc gia, Thao tác hòa điện (tại chỗ hoặc từ xa) phải được thực hiện tại máy cắt có trang bị thiết bị hòa đồng bộ một trong các điều kiện hòa điện trên hệ thống điện có cấp điện áp ≤220 kV là:", "options": ["Góc lệch pha của điện áp giữa hai phía điểm hoà: d £ 150.", "Góc lệch pha của điện áp giữa hai phía điểm hoà: d £ 100.", "Góc lệch pha của điện áp giữa hai phía điểm hoà: d £ 250.", "Góc lệch pha của điện áp giữa hai phía điểm hoà: d £ 300."], "answer": 3}, {"question": "Theo Quy trình thao tác hệ thống điện quốc gia, Thao tác hòa điện (tại chỗ hoặc từ xa) phải được thực hiện tại máy cắt có trang bị thiết bị hòa đồng bộ một trong các điều kiện hòa điện trên hệ thống điện có cấp điện áp ≤220 kV là:", "options": ["Chênh lệch tần số giữa hai phía điểm hoà: Df £ 0,1 Hz.", "Chênh lệch tần số giữa hai phía điểm hoà: Df £ 0,15 Hz.", "Chênh lệch tần số giữa hai phía điểm hoà: Df £ 0,25 Hz.", "Chênh lệch tần số giữa hai phía điểm hoà: Df £ 0,5 Hz."], "answer": 2}, {"question": "Theo Quy trình thao tác hệ thống điện quốc gia, Thao tác hòa điện (tại chỗ hoặc từ xa) phải được thực hiện tại máy cắt có trang bị thiết bị hòa đồng bộ một trong các điều kiện hòa điện trên hệ thống điện có cấp điện áp ≤220 kV là:", "options": ["Chênh lệch điện áp giữa hai phía điểm hoà: DU £ 5%.", "Chênh lệch điện áp giữa hai phía điểm hoà: DU £ 10%.", "Chênh lệch điện áp giữa hai phía điểm hoà: DU £ 15%.", "Chênh lệch điện áp giữa hai phía điểm hoà: DU £ 20%."], "answer": 1}, {"question": "Khi nạp dầu vào máy biến áp, mục đích của việc phải xả e tại các đầu sứ mặt máy biến áp là:", "options": ["Để không hỏng sứ máy biến áp.", "Để thoát hết khí trong máy và trong sứ.", "Để biết mức dầu khi nạp.", "Các câu A, B và C đều đúng."], "answer": 1}, {"question": "Khi đặt và tháo tiếp đất di động, những việc làm nào sau đây là đúng:", "options": ["Đặt và tháo tiếp đất đều phải có 2 người thực hiện và đều có trình độ an toàn ít nhất bậc 4.", "Khi đặt tiếp đất: ngắn mạch 3 dây pha trước, sau đó đấu xuống đất; khi tháo tiếp đất thì làm ngược lại.", "Khi đặt tiếp đất: phải đấu một đầu với đất trước, sau đó mới lắp đầu kia với dây dẫn; khi tháo tiếp đất thì làm ngược lại.", "Các câu A, B và C đều sai."], "answer": 2}, {"question": "Nối tiếp đất để sửa chữa nhằm:", "options": ["Tránh dòng cảm ứng do đi gần đường dây/thiết bị mang điện khác.", "Tránh dòng điện lạc.", "Tránh dòng rò.", "Cả 3 nội dung trên đều đúng."], "answer": 0}, {"question": "Theo chức năng làm việc thì hệ thống nối đất chia ra làm mấy loại:", "options": ["2 loại: Nối đất làm việc và Nối đất an toàn.", "1 loại: Nối đất làm việc.", "3 loại: Nối đất chống sét, Nối đất làm việc và Nối đất an toàn.", "1 loại: Nối đất an toàn."], "answer": 2}, {"question": "Tác dụng của nối đất an toàn?", "options": ["Để hạn chế mức độ nguy hiểm cho con người và động vật khi chạm vào vỏ thiết bị bị rò điện.", "Là nối đất các kim thu sét, dây chống sét nhằm đảm bảo an toàn cho thiết bị điện nằm trong vùng bảo vệ khi có sét đánh.", "Đảm bảo cho các thiết bị điện làm việc đúng chế độ đã định.", "Các câu A, B và C đều đúng."], "answer": 0}, {"question": "Tác dụng của nối đất chống sét?", "options": ["Là nối đất vỏ thiết bị điện nhằm hạn chế mức độ nguy hiểm cho con người và động vật khi chạm vào vỏ thiết bị bị rò điện.", "Để tản dòng điện sét một cách thuận lợi giữ cho điện thế ở các thiết bị thu sét không quá cao tránh bị phóng điện ngược từ nó về thiết bị.", "Là nối đất trung tính máy biến áp, cuộn dập hồ quang… nhằm đảm bảo cho các thiết bị điện làm việc đúng chế độ đã định.", "Các câu A, B và C đều đúng."], "answer": 1}, {"question": "Điều kiện hoạt động bình thường của tế bào quang điện (NOCT- Normal Operating Cell Temperature) là:", "options": ["Là giá trị bức xạ mặt trời danh nghĩa được thiết lập ra do thử nghiệm STC không đảm bảo được các điều kiện giống với thực tế trong mọi trường hợp.", "Là giá trị nhiệt độ hoạt động tế bào danh nghĩa được thiết lập ra do thử nghiệm STC không đảm bảo được các điều kiện giống với thực tế trong mọi trường hợp.", "Là giá trị áp suất khí quyển danh nghĩa được thiết lập ra do thử nghiệm STC không đảm bảo được các điều kiện giống với thực tế trong mọi trường hợp.", "Là giá trị tốc độ gió danh nghĩa được thiết lập ra do thử nghiệm STC không đảm bảo được các điều kiện giống với thực tế trong mọi trường hợp."], "answer": 1}, {"question": "Chế độ SVG vào ban đêm của Inverter tại NMĐMT ĐLMT cho phép:", "options": ["Điều chỉnh điện áp lưới điện vào ban đêm.", "Điều chỉnh tấn số lưới điện vào ban đêm.", "Điều chỉnh công suất phản kháng vào ban đêm.", "Điều chỉnh công suất tác dụng vào ban đêm."], "answer": 2}, {"question": "Điều khiển MPPT (Maximum Power Point Tracker) là:", "options": ["Điều khiển theo dõi điểm làm việc với dòng điện cực đại.", "Điều khiển theo dõi điểm làm việc với điện áp cực đại.", "Điều khiển theo dõi điểm làm việc với tần số cực đại.", "Điều khiển theo dõi điểm làm việc với công suất cực đại."], "answer": 3}, {"question": "Chức năng nào sau đây có ở Inverter tại NMĐMT ĐLMT:", "options": ["Khả năng bám theo tần số.", "Khả năng bám theo điện áp cao thế (HVRT).", "Khả năng bám theo điện áp hạ thế (LVRT).", "Cả A, B, C."], "answer": 3}, {"question": "Thời gian đào tạo trưởng ca đối với các nhà máy điện hoặc trung tâm điều khiển nhóm nhà máy điện sử dụng nguồn năng lượng tái tạo có tổng quy mô công suất trên 30 MW ít nhất là:", "options": ["3 tháng.", "6 tháng.", "9 tháng.", "12 tháng."], "answer": 2}, {"question": "Thời gian đào tạo trưởng ca đối với các nhà máy điện hoặc trung tâm điều khiển nhóm nhà máy điện sử dụng nguồn năng lượng tái tạo có tổng quy mô công suất dưới 30 MW là ít nhất:", "options": ["3 tháng.", "6 tháng.", "9 tháng.", "12 tháng."], "answer": 1}, {"question": "AGC là hệ thống:", "options": ["Là hệ thống thiết bị tự động điều chỉnh tăng giảm công suất tác dụng của tổ máy phát điện nhằm duy trì tần số của hệ thống điện ổn định trong phạm vi cho phép theo nguyên tắc vận hành kinh tế tổ máy phát điện.", "Là hệ thống tự động điều khiển điện áp đầu cực tổ máy phát điện thông qua tác động vào hệ thống kích từ của máy phát để đảm bảo điện áp tại đầu cực máy phát trong giới hạn cho phép.", "Là hệ thống phần mềm tự động hỗ trợ việc quản lý, giám sát và điều khiển tối ưu lưới điện phân phối.", "Là hệ thống các thiết bị điều khiển trong nhà máy điện hoặc trạm điện được kết nối mạng theo nguyên tắc điều khiển phân tán để tăng độ tin cậy và hạn chế các ảnh hưởng do sự cố phần tử điều khiển trong nhà máy điện hoặc trạm điện."], "answer": 0}, {"question": "Theo Thông tư quy định quy trình điều độ HTĐ quốc gia: Thực hiện biểu đồ điện áp theo phương án nào:", "options": ["Nhân viên vận hành tại nhà máy điện tự điều chỉnh điện áp const letters = ["A","B","C","D","E","F","G","H"];

function getRandomQuestions(arr, n) {
  return arr.sort(() => 0.5 - Math.random()).slice(0, 50);
}

const selectedQuestions = getRandomQuestions(questions, 50);
const form = document.getElementById("quizForm");

selectedQuestions.forEach((q, index) => {
  let html = "<div class='question'>";
  html += "<p><b>Câu " + (index+1) + ":</b> " + q.question + "</p>";
  q.options.forEach((opt, i) => {
    html += "<label id='label"+index+"_"+i+"'>";
    html += "<input type='radio' name='q"+index+"' value='"+i+"'> ";
    html += letters[i] + ". " + opt;
    html += "</label>";
  });
  html += "</div>";
  form.innerHTML += html;
});

function submitQuiz() {
  let score = 0;

  selectedQuestions.forEach(function(q, index) {
    const selected = document.querySelector("input[name='q"+index+"']:checked");

    q.options.forEach(function(opt, i) {
      const label = document.getElementById("label"+index+"_"+i);
      if (i === q.answer) label.classList.add("correct-option");
      if (selected && parseInt(selected.value) === i && i !== q.answer) {
        label.classList.add("wrong-option");
      }
    });

    if (selected && parseInt(selected.value) === q.answer) {
      score++;
    }
  });

  document.getElementById("summary").innerHTML =
    "Số câu đúng: " + score + "/50 - Điểm: " + (score/50*10).toFixed(2) + "/10";

  window.scrollTo(0,0);
}
